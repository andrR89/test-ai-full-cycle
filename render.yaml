# =============================================================================
# TEMPLATE: Copy this file to the ROOT of your target repository.
# Render reads this file automatically when you connect the repo.
# Defines backend (Node.js), frontend (React/Vite) and PostgreSQL.
# =============================================================================

services:
  - type: web
    name: app-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: app-db
          property: connectionString
      - key: PORT
        value: 3000

  - type: static
    name: app-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: app-backend
          type: web
          property: host

databases:
  - name: app-db
    databaseName: appdb
    user: appdb
    plan: free
