# =============================================================================
# Blueprint Render — backend (Node.js) + PostgreSQL
#
# NOTA: Static sites (frontend React/Vite) não são suportados no Blueprint.
# Criar o frontend manualmente no Render Dashboard:
#   New > Static Site > conectar repo > rootDir: frontend
#   Build: npm install && npm run build  |  Publish: dist
# =============================================================================

services:
  - type: web
    name: app-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: app-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: app-db
    databaseName: appdb
    user: appdb
    plan: free
