# =============================================================================
# TEMPLATE: Copy this file to .github/workflows/deploy-staging.yml
#
# Triggers Render deploys when an AI-generated PR is merged to main.
#
# Required secrets in the target repo:
#   RENDER_BACKEND_DEPLOY_HOOK  — from Render > backend service > Deploy Hook
#   RENDER_FRONTEND_DEPLOY_HOOK — from Render > frontend static site > Deploy Hook
#   RENDER_BACKEND_URL          — e.g. https://app-backend.onrender.com
#   RENDER_FRONTEND_URL         — e.g. https://app-frontend.onrender.com
# =============================================================================

name: Deploy Staging

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, '[AI]'))

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Trigger Render backend deploy
        if: hashFiles('backend/**') != ''
        run: |
          echo "Triggering backend deploy on Render..."
          curl -s --fail "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" | jq .
          echo "Backend deploy triggered."

      - name: Trigger Render frontend deploy
        if: hashFiles('frontend/**') != ''
        run: |
          echo "Triggering frontend deploy on Render..."
          curl -s --fail "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" | jq .
          echo "Frontend deploy triggered."

      - name: Comment on PR with deploy status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const backendUrl = '${{ secrets.RENDER_BACKEND_URL }}' || '_not configured_';
            const frontendUrl = '${{ secrets.RENDER_FRONTEND_URL }}' || '_not configured_';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '### Staging Deploy triggered on Render',
                '',
                '| Service | URL |',
                '|---|---|',
                `| Backend | ${backendUrl} |`,
                `| Frontend | ${frontendUrl} |`,
                '',
                '_Deploy triggered by AI Issue Solver pipeline. Check Render dashboard for status._',
              ].join('\n'),
            });
