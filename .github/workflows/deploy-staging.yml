# =============================================================================
# TEMPLATE: Copy this file to .github/workflows/deploy-staging.yml
# in any project managed by the AI pipeline.
#
# Triggers automatically when an AI-generated PR is merged to main.
# Add your actual deploy commands in the "Deploy to staging" step.
# =============================================================================

name: Deploy Staging

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run when an AI-generated PR is merged (not just closed)
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, '[AI]')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run tests (smoke check before deploy)
        working-directory: backend
        run: npm test -- --passWithNoTests

      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          # Add your deploy commands here, e.g.:
          # npm run deploy:staging
          # docker build + push
          # kubectl apply
          echo "Deploy complete."

      - name: Comment on PR with deploy status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '### Staging Deploy\n\n✅ Deployed to staging successfully after merge.\n\n_Triggered by AI Issue Solver pipeline_',
            });
