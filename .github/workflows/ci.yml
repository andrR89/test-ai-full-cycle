# =============================================================================
# TEMPLATE: Copy this file to .github/workflows/ci.yml
# in any project you want the AI pipeline to validate before merging.
#
# Runs tests + coverage on every PR. The AI deployer waits for these
# checks to pass before auto-merging.
# =============================================================================

name: CI

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests with coverage
        working-directory: backend
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7
