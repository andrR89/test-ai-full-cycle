# =============================================================================
# TEMPLATE: Copy this file to .github/workflows/ci.yml
# Runs tests + coverage (backend) and build check (frontend) on every PR.
# The AI deployer waits for these checks to pass before auto-merging.
# =============================================================================

name: CI

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    if: hashFiles('backend/**') != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run tests with coverage
        working-directory: backend
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    if: hashFiles('frontend/**') != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Run tests
        working-directory: frontend
        run: npm test -- --passWithNoTests
